resources:
  jobs:
    ETL_RocketLab_Medallion:
      name: ETL_RocketLab_Medallion
      schedule:
        quartz_cron_expression: 11 0 13 * * ?
        timezone_id: America/Bahia
        pause_status: UNPAUSED
      tasks:
        - task_key: Bronze
          notebook_task:
            notebook_path: /Workspace/Users/mhma@cesar.school/Atividade_land_to_bronze.ipynb
            source: WORKSPACE
        - task_key: Silver
          depends_on:
            - task_key: Bronze
          notebook_task:
            notebook_path: /Workspace/Users/mhma@cesar.school/Atividade_bronze_to_silver.ipynb
            source: WORKSPACE
        - task_key: Gold
          depends_on:
            - task_key: Silver
          notebook_task:
            notebook_path: /Workspace/Users/mhma@cesar.school/Atividade_silver_to_gold.ipynb
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED